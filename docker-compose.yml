version: '3.8'

services:
  db:
    image: mariadb:11
    container_name: calculator-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Test12}
      MYSQL_DATABASE: calc_data
    ports:
      # Change the left side (host port) if 3307 is already taken on your machine.
      # e.g. "3308:3306" or set DB_HOST_PORT=3308 before running docker compose up
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Auto-create all tables on first startup
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    image: dinal1999/week7_assignment
    container_name: calculator-app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306          # internal container port — always 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-Test12}
      DISPLAY: host.docker.internal:0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix

volumes:
  db_data:

# Usage:
#   docker compose up --build
#
# To use a different host port (e.g. if 3307 is taken):
#   DB_HOST_PORT=3308 docker compose up --build
#
# To use different credentials:
#   DB_USER=myuser DB_PASSWORD=mypass docker compose up --build
